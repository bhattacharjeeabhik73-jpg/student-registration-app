<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registered Students</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: lightgreen;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

#searchBox{
    display:block;
    margin:auto;
    margin-top:20px;
    padding:8px;
    width:40%;
    font-size:16px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    border:2px solid black;
    padding:10px;
    text-align:center;
    font-weight:bold;
    color:black;
    background-color:#d9ffd9;
}

td{
    border:1px solid black;
    padding:10px;
    text-align:center;
    color:rgb(163, 69, 245);
}

tr:nth-child(even){
    background-color:#f2fff2;
}

button{
    padding:5px 10px;
    margin:2px;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>Registered Students</h1>

<input type="text" id="searchBox" placeholder="Search students..." onkeyup="searchStudents()">

<table id="studentsTable">

<thead>
<tr>
<th>ID</th>
<th>Username</th>
<th>Country</th>
<th>Subject</th>
<th>Address</th>
<th>Phone</th>
<th>Actions</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

<script>

fetch("/students")
.then(response => response.json())
.then(data => {

    const tableBody = document.querySelector("#studentsTable tbody");

    data.forEach(student => {

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${student.id}</td>
            <td>${student.username}</td>
            <td>${student.country}</td>
            <td>${student.subject}</td>
            <td>${student.address}</td>
            <td>${student.phone}</td>

            <td>
                <button onclick="updateStudent(${student.id})">Update</button>
                <button onclick="deleteStudent(${student.id})">Delete</button>
            </td>
        `;

        tableBody.appendChild(row);

    });

});

function deleteStudent(id) {

fetch("/delete-student", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({ id })
})
.then(res => res.text())
.then(data => {
    alert(data);
    location.reload();
})
.catch(err => {
    alert("Error deleting student");
});

}

function updateStudent(id){

const username = prompt("Enter new username");
const country = prompt("Enter new country");
const subject = prompt("Enter new subject");
const address = prompt("Enter new address");
const phone = prompt("Enter new phone");

fetch("/update-student",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify({
        id,username,country,subject,address,phone
    })
})
.then(res=>res.text())
.then(data=>{
    alert(data);
    location.reload();
})
.catch(err=>{
    alert("Update failed");
});

}

function searchStudents(){

let input=document.getElementById("searchBox").value.toLowerCase();
let rows=document.querySelectorAll("#studentsTable tbody tr");

rows.forEach(row=>{

let text=row.innerText.toLowerCase();

if(text.includes(input)){
    row.style.display="";
}
else{
    row.style.display="none";
}

});

}

</script>

</body>
</html>
